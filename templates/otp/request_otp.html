{% extends "base.html" %}

{% block body_class %}auth-page{% endblock %}

{% block title %}Request OTP{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2 class="auth-title">Request OTP</h2>

        <form method="POST" action="{{ url_for('otp_bp.request_otp') }}">

            <div class="form-group">
                <input 
                    type="tel"
                    name="mobile"
                    placeholder="Enter mobile number"
                    maxlength="10"
                    inputmode="numeric"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                    required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    📩 Send OTP
                </button>
            </div>

        </form>

        <div class="auth-links">

            <p>
                Already received an OTP?
                <a href="{{ url_for('otp_bp.verify_otp') }}" class="btn-outline">
                    Verify OTP
                </a>
            </p>

        </div>

    </div>

</div>

{% endblock %}
