{% extends "base.html" %}

{% block body_class %}auth-page{% endblock %}

{% block title %}Citizen Signup{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2 class="auth-title">Signup</h2>

        <form method="POST" action="{{ url_for('auth.signup') }}">

            <div class="form-group">
                <input 
                    type="text"
                    name="name"
                    placeholder="Enter your name"
                    required>
            </div>

            <div class="form-group">
                <input 
                    type="tel"
                    name="mobile"
                    placeholder="Enter mobile number"
                    maxlength="10"
                    inputmode="numeric"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                    required>
            </div>

            <div class="form-group">
                <input 
                    type="password"
                    name="password"
                    placeholder="Choose a password"
                    required>
            </div>

            <div class="form-group checkbox-label">
                <label>
                    <input type="checkbox" name="assisted_signup">
                    Assisted Signup (for elderly/disabled)
                </label>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    📝 Sign Up
                </button>
            </div>

        </form>

        <div class="auth-links">

            <p>
                Already have an account?
                <a href="{{ url_for('auth.login') }}" class="btn-outline">
                    Login
                </a>
            </p>

            <p class="auth-note">
                After signup, you will receive an OTP to verify your mobile.
            </p>

        </div>

    </div>

</div>

{% endblock %}
