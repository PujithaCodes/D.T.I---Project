{% extends "base.html" %}

{% block body_class %}auth-page{% endblock %}

{% block title %}Verify OTP{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2 class="auth-title">Verify OTP</h2>

        <p class="otp-info">
            OTP sent to: <strong>{{ mobile }}</strong><br>
            <span>(Valid for 1 minute)</span>
        </p>

        <form method="POST" action="{{ url_for('otp_bp.verify_otp') }}">

            <div class="form-group">
                <input 
                    type="tel" 
                    name="otp" 
                    placeholder="Enter 6-digit OTP"
                    maxlength="6"
                    inputmode="numeric"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                    required>
            </div>

            <div class="otp-actions">

                <button type="submit" class="btn-primary">
                    ✅ Verify OTP
                </button>

                <button 
                    type="submit"
                    formaction="{{ url_for('otp_bp.resend_otp') }}"
                    class="btn-secondary"
                    formnovalidate>
                    🔄 Resend OTP
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
