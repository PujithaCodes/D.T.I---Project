{% extends "base.html" %}

{% block body_class %}auth-page{% endblock %}

{% block title %}Reset Password{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2 class="auth-title">Reset Your Password</h2>

        <form method="POST" action="{{ url_for('auth.profile_reset_password') }}">

            <div class="form-group">
                <input 
                    type="password"
                    id="current_password"
                    name="current_password"
                    placeholder="Current Password"
                    required>
            </div>

            <div class="form-group">
                <input 
                    type="password"
                    id="new_password"
                    name="new_password"
                    placeholder="New Password"
                    required>
            </div>

            <div class="form-group">
                <input 
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    placeholder="Confirm New Password"
                    required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    🔒 Reset Password
                </button>
            </div>

        </form>

        <div class="auth-links">

            <a href="{{ url_for('auth.forgot_password') }}" class="btn-outline">
                Forgot Password ❓
            </a>

            <a href="{{ url_for('profile.profile_page') }}" class="btn-outline">
                ⬅ Back to Profile
            </a>

        </div>

    </div>

</div>

{% endblock %}
